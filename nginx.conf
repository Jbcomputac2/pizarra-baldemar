server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip a casi todo
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/woff font/woff2;

  # Sin caché agresiva: cada deploy se ve al instante con un refresh normal.
  # (Para esta app es lo ideal — evita tener que limpiar caché nunca.)
  location /assets/ {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # el index nunca se cachea
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # entrada principal
  location / {
    try_files $uri $uri/ /index.html;
  }
}
